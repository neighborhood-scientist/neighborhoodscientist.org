project:
  type: website

website:
  title: "Your Neighborhood Scientist"
  site-url: https://neighborhoodscientist.org
  description: "science news for everyone"
  repo-url: https://github.com/neighborhood-scientist/neighborhoodscientist.org # TODO change to website repo
  #favicon: TODO
  open-graph: true
  search:
    location: navbar
    type: overlay
  navbar:
    right:
      - text: Home
        href: index.qmd
      - about.qmd
      - text: Subscribe
        href: subscribe.qmd
  page-footer:
    left: "Your Neighborhood Scientist"
    center:
      - about.qmd
      - faq.qmd
      - LICENSE.qmd
    right:
      - text: "{{< fa brands bluesky >}}"
        href: https://bsky.app/profile/your.neighborhoodscientist.org
        rel: me
      - icon: github
        href: https://github.com/neighborhood-scientist/
        aria-label: GitHub organization
      - icon: rss
        href: index.xml
        aria-label: RSS Feed

format:
  html:
    theme:
      - yns.scss
      - litera
    embed-resources: false

execute:
  freeze: auto
  eval: true
